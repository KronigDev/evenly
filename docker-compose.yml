name: evenly

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-evenly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evenly}
      POSTGRES_DB: ${POSTGRES_DB:-evenly}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      # Postgres 18+ stores data in a version subdir; mount one level up.
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-evenly} -d ${POSTGRES_DB:-evenly}']
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # The Evenly Next.js app. Runs migrations on startup, then serves.
  #   App: http://localhost:3000
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-evenly}:${POSTGRES_PASSWORD:-evenly}@db:5432/${POSTGRES_DB:-evenly}?schema=public
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-dev-only-insecure-secret-change-me-0123456789abcdef}
      # false = invite-only (first-ever account can always be created).
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-false}
      # Email goes over SMTP. Set SMTP_* in your .env to enable invites,
      # magic-link sign-in, verification, password reset and reminders;
      # if SMTP_HOST is empty those features simply do not work.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      EMAIL_FROM: ${EMAIL_FROM:-Evenly <no-reply@evenly.local>}
      EXCHANGE_RATE_API_URL: ${EXCHANGE_RATE_API_URL:-}
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY:-}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads

volumes:
  db_data:
  uploads_data:
