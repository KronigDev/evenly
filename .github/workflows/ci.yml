name: CI

# Runs the full quality gate on every push/PR to main or dev:
# install -> prisma generate -> format -> lint -> typecheck -> unit tests -> build.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # next build / prisma need these present; they are not real secrets.
      DATABASE_URL: postgresql://evenly:evenly@localhost:5432/evenly?schema=public
      AUTH_SECRET: github-actions-ci-only-secret-0123456789abcdef
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Prettier check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
